services:
  mysql:
    image: mysql:8.4
    container_name: pawsitter-mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: pawsitter
      MYSQL_USER: pawsitter
      MYSQL_PASSWORD: pawsitter_password
      MYSQL_ROOT_PASSWORD: root_password

    ports:
      - "3306:3306"

    volumes:
      - pawsitter-mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_password"]
      interval: 10s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: pawsitter-app
    restart: unless-stopped

    environment:
      SERVER_PORT: 3400
      DB_URL: jdbc:mysql://mysql:3306/pawsitter
      DB_USERNAME: pawsitter
      DB_PASSWORD: pawsitter_password

    ports:
      - "3400:3400"

    depends_on:
      mysql:
        condition: service_healthy

volumes:
  pawsitter-mysql-data: