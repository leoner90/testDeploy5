name: Delete Old MySQL Volumes

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted

    steps:
      - name: Show target volumes
        run: |
          docker volume ls --format '{{.Name}}' \
            | grep -E '^(fixmycity_mysql-data|pawsitter_pawsitter-mysql-data|test2deploy_pawsitter-mysql-data|testdeploy4_pawsitter-mysql-data|testdeploy5_pawsitter-mysql-data|testdeploy_pawsitter-mysql-data)$' \
            || true

      - name: Remove target volumes
        run: |
          docker volume rm -f \
            fixmycity_mysql-data \
            pawsitter_pawsitter-mysql-data \
            test2deploy_pawsitter-mysql-data \
            testdeploy4_pawsitter-mysql-data \
            testdeploy5_pawsitter-mysql-data \
            testdeploy_pawsitter-mysql-data \
            || true

      - name: Verify remaining volumes
        if: always()
        run: |
          docker volume ls