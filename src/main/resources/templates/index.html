<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PawSitter | Home</title>

    <link rel="stylesheet" th:href="@{/css/landingPageStyle.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-content">
    <section class="hero-section">
        <div class="hero-content">
            <h2>Find trusted pet sitters near you</h2>
            <p>We promise love and care for when you are not there.</p>
            <div class="hero-buttons">
                <a th:href="@{/sittersSearch}" class="button primary-button">Find Sitters</a>
                <a href="#how-it-works" class="button secondary-button">How We Work</a>
            </div>
        </div>

        <div class="hero-image-wrapper">
            <img th:src="@{/images/landingPageImages/landingPageImage1.jpg}"
                 class="hero-image"
                 alt="Pet sitter with a happy dog">
        </div>
    </section>

    <hr class="landingHr">

    <section class="how-it-works-section" id="how-it-works">
        <div class="how-it-works-title">
            <h1>How we work</h1>
        </div>
        <div class="how-it-works-grid">

            <div class="how-it-works-card">
                <img th:src="@{/images/landingPageImages/searchIcon.png}"
                     class="how-it-works-icon"
                     alt="Search icon">
                <h4><a href="#" class="how-it-works-link">Search Sitter</a></h4>
            </div>

            <div class="how-it-works-card">
                <img th:src="@{/images/landingPageImages/bookIcon.png}"
                     class="how-it-works-icon"
                     alt="Book icon">
                <h4><a href="#" class="how-it-works-link">Book &amp; Pay</a></h4>
            </div>

            <div class="how-it-works-card">
                <img th:src="@{/images/landingPageImages/careIcon.png}"
                     class="how-it-works-icon"
                     alt="Care icon">
                <h4><a href="#" class="how-it-works-link">Care &amp; Enjoy</a></h4>
            </div>

            <div class="how-it-works-card">
                <img th:src="@{/images/landingPageImages/reviewIcon.png}"
                     class="how-it-works-icon"
                     alt="Review icon">
                <h4><a href="#" class="how-it-works-link">Review the Service</a></h4>
            </div>

        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
