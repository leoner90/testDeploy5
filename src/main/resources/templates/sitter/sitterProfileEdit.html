<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PawSitter | Edit Sitter Profile</title>
    <link rel="stylesheet" th:href="@{/css/mainStyle.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page-content">
    <section class="form-container">

        <h1>Edit sitter profile</h1>

        <form th:action="@{/sitter/profile/edit}" th:object="${sitterProfileUpdate}" method="post" enctype="multipart/form-data">
            <label for="image">Profile image</label>
            <input id="image" type="file" th:field="*{image}" accept="image/jpeg,image/png">
            <p th:if="${#fields.hasErrors('image')}" th:errors="*{image}" class="form-error"></p>


            <label class="sitter-and-owner-profile-textarea" for="location">Location</label>

            <select id="location" th:field="*{location}">
                <option value="">Select location</option>
                <option value="Riga">Riga</option>
                <option value="Jurmala">Jurmala</option>
                <option value="Jelgava">Jelgava</option>
                <option value="Liepaja">Liepaja</option>
                <option value="Ventspils">Ventspils</option>
                <option value="Daugavpils">Daugavpils</option>
            </select>

            <p th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="form-error"></p>


            <label for="phoneNumber">Phone number</label>
            <input id="phoneNumber" type="tel" th:field="*{phoneNumber}" placeholder="+37120000000">
            <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="form-error"></p>


            <label for="pricePerDay">Price per day</label>

            <input id="pricePerDay" type="number" step="0.01" min="0" th:field="*{pricePerDay}">

            <p th:if="${#fields.hasErrors('pricePerDay')}" th:errors="*{pricePerDay}" class="form-error"></p>


            <label for="description">About me</label>

            <textarea id="description" th:field="*{description}" rows="6" maxlength="1000"></textarea>

            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="form-error"></p>


            <div class="form-actions">
                <button type="submit" class="button primary-button">Save changes</button>
                <a th:href="@{/sitter/profile}" class="button secondary-button">Cancel</a>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
