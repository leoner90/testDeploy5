<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PawSitter | Registration</title>
        <link rel="stylesheet" th:href="@{/css/mainStyle.css}">
        <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    </head>
    <body>
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <main class="page-content">
            <section class="form-container">
                <h1>Create an account</h1>

                <form th:action="@{/registration}" th:object="${registrationRequest}" method="post">
                    <div th:if="${registrationError}"
                         th:text="${registrationError}"
                         class="form-error">
                    </div>

                    <label for="firstName">First name</label>
                    <input id="firstName" type="text" th:field="*{firstName}">
                    <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="form-error"></p>

                    <label for="lastName">Last name</label>
                    <input id="lastName" type="text" th:field="*{lastName}">
                    <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="form-error"></p>

                    <label for="email">Email</label>
                    <input id="email" type="email" th:field="*{email}">
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="form-error"></p>

                    <label for="confirmEmail">Confirm email</label>
                    <input id="confirmEmail" type="email" th:field="*{confirmEmail}">
                    <p th:if="${#fields.hasErrors('confirmEmail')}" th:errors="*{confirmEmail}" class="form-error"></p>

                    <label for="password">Password</label>
                    <input id="password" type="password" th:field="*{password}">
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="form-error"></p>

                    <label for="confirmPassword">Confirm password</label>
                    <input id="confirmPassword" type="password" th:field="*{confirmPassword}">
                    <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="form-error"></p>

                    <label for="phoneNumber">Phone number</label>
                    <input id="phoneNumber" type="text" th:field="*{phoneNumber}">
                    <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="form-error"></p>

                    <label for="role">Account type</label>
                    <select id="role" th:field="*{role}">
                        <option value="">Select account type</option>
                        <option value="USER">Pet owner</option>
                        <option value="SITTER">Pet sitter</option>
                    </select>

                    <p th:if="${#fields.hasErrors('role')}" th:errors="*{role}" class="form-error"></p>

                    <button type="submit" class="button primary-button">Register</button>
                </form>

                <p>Already have an account?<a th:href="@{/login}">Log in</a></p>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </body>
</html>
