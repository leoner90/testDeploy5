<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PawSitter | Login</title>
        <link rel="stylesheet" th:href="@{/css/mainStyle.css}">
        <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    </head>
    <body>
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <main class="page-content">
            <section class="form-container">
                <h1>Log in</h1>

                <form th:action="@{/login}" method="post">

                    <p th:if="${param.registered}" class="form-success">Registration successful. You can now log in.</p>
                    <p th:if="${param.error}" class="form-error">Invalid email or password.</p>
                    <p th:if="${param.logout}" class="form-success">You have been logged out.</p>

                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required>

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required>

                    <button type="submit" class="button primary-button">Log in</button>
                </form>

                <p>
                    Do not have an account?
                    <a th:href="@{/registration}">Registration</a>
                </p>
            </section>
        </main>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </body>
</html>
